version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ielts
      POSTGRES_PASSWORD: ielts
      POSTGRES_DB: ielts_vocab
    ports:
      - "5432:5432"
    volumes:
      - ielts_pgdata:/var/lib/postgresql/data

volumes:
  ielts_pgdata:
